<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="sidebar-top">
                <span class="model-name">LLM</span>
                <span class="model-version">v1.0</span>
            </div>
            <div class="sidebar-info">
                <div class="info-item">
                    <span class="info-label">Parameters</span>
                    <span class="info-value">94M</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Vocabulary</span>
                    <span class="info-value">80k</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Training data</span>
                    <span class="info-value">742k Q&A pairs</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Architecture</span>
                    <span class="info-value">Transformer</span>
                </div>
            </div>
            <div class="sidebar-bottom">
                <span class="built-by">Built by Kautuk Adarsh</span>
            </div>
        </aside>

        <main class="chat-area">
            <div class="messages" id="messages">
                <div class="empty-state" id="emptyState">
                    <h1>What do you want to know?</h1>
                    <p>A language model trained from scratch on Wikipedia and Q&A data.</p>
                </div>
            </div>

            <div class="input-bar">
                <div class="input-wrapper">
                    <textarea
                        id="questionInput"
                        placeholder="Ask anything..."
                        rows="1"
                        onkeydown="handleKey(event)"
                        oninput="autoResize(this)"
                    ></textarea>
                    <button id="sendBtn" onclick="sendMessage()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="19" x2="12" y2="5"></line>
                            <polyline points="5 12 12 5 19 12"></polyline>
                        </svg>
                    </button>
                </div>
                <p class="disclaimer">Responses are generated by a custom-trained model and will be inaccurate so take care.</p>
            </div>
        </main>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
